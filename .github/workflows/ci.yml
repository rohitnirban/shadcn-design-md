name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify extension zip layout
        shell: bash
        run: |
          ZIP=$(ls apps/extension/shadcn-design-md-*.zip | head -1)
          echo "Inspecting $ZIP"
          unzip -l "$ZIP"
          if ! unzip -l "$ZIP" | awk '{print $NF}' | grep -qx "manifest.json"; then
            echo "::error::manifest.json not at zip root in $ZIP"
            exit 1
          fi
          if unzip -l "$ZIP" | awk '{print $NF}' | grep -qE "^(extension|dist|shadcn-design-md)/"; then
            echo "::error::zip has nested top-level dir"
            exit 1
          fi
