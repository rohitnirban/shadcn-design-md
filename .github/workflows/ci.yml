name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify extension zip layout
        run: |
          ZIP=$(ls apps/extension/shadcn-design-md-*.zip | head -1)
          echo "Inspecting $ZIP"
          unzip -l "$ZIP"
          unzip -l "$ZIP" | grep -E "^\s+\d+.*manifest\.json$" | grep -v "/manifest.json"
